<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social SEO Application</title>
    <link rel="icon" href="Logo.png" type="image/png">

    <!-- Open Graph Meta Tags for Social Media Previews -->
    <meta property="og:title" content="Social SEO">
    <meta property="og:description" content="A mathematically proven way to get consistent virality.">
    <meta property="og:image" content="https://socialseo.in/preview-image.png">
    <meta property="og:url" content="https://socialseo.in">

    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '3739845356157365');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=3739845356157365&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4QRRG2GFLS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4QRRG2GFLS');
    </script>

    <!-- Fire the Lead conversion when someone clicks Apply Now -->
    <script>
      function trackApplyNow() {
        if (typeof fbq === 'function') { fbq('track', 'Lead'); }
        if (typeof gtag === 'function') {
          gtag('event', 'click', { event_category: 'Button', event_label: 'Apply Now' });
        }
        return true; // allow the link to navigate to Calendly
      }
    </script>

    <!-- Inline critical styles to prevent FOUC -->
    <style>
      body { margin: 0; background-color: #010414; }
    </style>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <div id="root">
        <!-- Animated background -->
        <div class="background-container">
            <div class="shape shape1"></div>
            <div class="shape shape2"></div>
            <div class="shape shape3"></div>
        </div>

        <!-- Header -->
        <header class="app-header">
            <a class="logo" href="/" style="text-decoration: none;">
                <img src="Logo.png" alt="Social SEO Logo">
            </a>
            <a class="cta-button header-apply-button"
               style="display: inline-block; text-decoration: none;"
               href="https://calendly.com/suresh-socialseo/socialseo-instant-report"
               onclick="return trackApplyNow();">Apply Now</a>
        </header>

        <!-- Landing -->
        <div class="landing-container">
            <div class="top-heading-group">
                <h1 class="main-heading gradient-text">Social SEO</h1>
                <p class="sub-heading">A mathematically proven way to get consistent virality.</p>
            </div>
            <div class="card">
                <div class="video-container">
                    <iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/6hMCr1-X1g0?si=3XV0M2lhl-j2zXs2&rel=0&showinfo=0&modestbranding=1&loop=1&playlist=6hMCr1-X1g0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                </div>
                <a class="cta-button main-apply-button"
                   style="margin-top: 2.5rem; display: inline-block; text-decoration: none;"
                   href="https://calendly.com/suresh-socialseo/socialseo-instant-report"
                   onclick="return trackApplyNow();">Apply Now</a>
            </div>
        </div>
    </div>
</body>
</html>
